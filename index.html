<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contexto - All-in-One Textplattform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <h1>Contexto</h1>
            <p>Contexto filtert Kernpunkte, korrigiert Grammatik und optimiert deine Texte per Knopfdruck.</p>
        </header>

        <div class="mac-window">
            <div class="mac-header">
                <div class="mac-buttons">
                    <span class="close"></span>
                    <span class="minimize"></span>
                    <span class="expand"></span>
                </div>
                <div class="mac-title">contexto_secure_backend.js</div>
            </div>

            <div class="mac-body">
                <div class="textarea-container">
                    <textarea id="text-input" placeholder="Füge hier deinen Text ein..."></textarea>
                    <div class="char-badge"><span id="char-count">0</span> Zeichen</div>
                </div>

                <div class="modul-section">
                    <div class="section-title">ANALYSE-MODUL WÄHLEN:</div>
                    <div class="modul-grid">
                        <button class="modul-btn active" data-modul="Zusammenfassung">📄 Zusammenfassung</button>
                        <button class="modul-btn" data-modul="Einfach Erklären">💡 Einfach Erklären</button>
                        <button class="modul-btn" data-modul="Profi-Stil umschreiben">💼 Profi-Stil umschreiben</button>
                        <button class="modul-btn" data-modul="Grammatik-Check">📝 Grammatik-Check</button>
                        <button class="modul-btn" data-modul="Übersetzer">🌐 Übersetzer</button>
                    </div>
                </div>

                <div class="extra-utilities">
                    <label for="file-upload" class="utility-link">📎 Datei einfügen (.txt)</label>
                    <input type="file" id="file-upload" accept=".txt" style="display: none;">
                    <span id="dictate-btn" class="utility-link">🎙️ Spracheingabe</span>
                    <span class="metrics-text">Wörter: <span id="word-count">0</span></span>
                </div>

                <div id="language-box" class="language-selector-box hidden">
                    <label for="language-select">Ziel-Sprache auswählen: </label>
                    <select id="language-select" class="dropdown">
                        <option value="English">Englisch (English)</option>
                        <option value="Spanish">Spanisch (Español)</option>
                        <option value="French">Französisch (Français)</option>
                        <option value="Italian">Italienisch (Italiano)</option>
                        <option value="German">Deutsch (Deutsch)</option>
                        <option value="Mandarin Chinese">Chinesisch (中文)</option>
                        <option value="Japanese">Japanisch (日本語)</option>
                        <option value="Russian">Russisch (Русский)</option>
                        <option value="Arabic">Arabisch (العربية)</option>
                        <option value="Portuguese">Portugiesisch (Português)</option>
                    </select>
                </div>

                <div class="action-row">
                    <button id="execute-btn" class="btn-execute">Analyse ausführen</button>
                    <button id="reset-btn" class="btn-reset">Zurücksetzen</button>
                </div>

                <div id="result-card" class="result-card hidden">
                    <div class="result-header">
                        <h3 id="result-title">✨ Ergebnis</h3>
                        <div class="result-actions">
                            <span id="speak-btn" title="Vorlesen">🔊</span>
                            <span id="download-btn" title="Herunterladen">📥</span>
                        </div>
                    </div>
                    <div id="text-output" class="result-content"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const textInput = document.getElementById('text-input');
        const charCount = document.getElementById('char-count');
        const wordCount = document.getElementById('word-count');
        const modulBtns = document.querySelectorAll('.modul-btn');
        const languageBox = document.getElementById('language-box');
        const executeBtn = document.getElementById('execute-btn');
        const resetBtn = document.getElementById('reset-btn');
        const resultCard = document.getElementById('result-card');
        const resultTitle = document.getElementById('result-title');
        const textOutput = document.getElementById('text-output');

        let aktuellesModul = "Zusammenfassung";

        // Live-Zähler
        textInput.addEventListener('input', () => {
            const text = textInput.value;
            charCount.innerText = text.length;
            wordCount.innerText = text.trim() ? text.trim().split(/\s+/).length : 0;
        });

        // Modul-Kapsel Klick-Logik
        modulBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                modulBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                aktuellesModul = btn.getAttribute('data-modul');

                if (aktuellesModul === "Übersetzer") {
                    languageBox.classList.remove('hidden');
                } else {
                    languageBox.classList.add('hidden');
                }
            });
        });

        // Datei einfügen
        document.getElementById('file-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                textInput.value = evt.target.result;
                textInput.dispatchEvent(new Event('input'));
            };
            reader.readAsText(file);
        });

        // Spracheingabe
        const dictateBtn = document.getElementById('dictate-btn');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'de-DE';
            dictateBtn.addEventListener('click', () => {
                recognition.start();
                dictateBtn.innerText = "🎙️ Höre...";
            });
            recognition.addEventListener('result', (e) => {
                textInput.value += e.results[0][0].transcript;
                textInput.dispatchEvent(new Event('input'));
            });
            recognition.addEventListener('end', () => { dictateBtn.innerText = "🎙️ Spracheingabe"; });
        }

        // Ausführen
        executeBtn.addEventListener('click', async () => {
            const text = textInput.value.trim();
            if (!text) return alert("Bitte gib zuerst einen Text ein!");

            resultCard.classList.remove('hidden');
            textOutput.innerText = "Verarbeite Anfrage...";
            resultTitle.innerText = `${aktuellesModul}-Ergebnis`;

            const zielSprache = aktuellesModul === "Übersetzer" ? document.getElementById('language-select').value : null;

            try {
                const response = await fetch('/.netlify/functions/translate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, modul: aktuellesModul, language: zielSprache })
                });
                const data = await response.json();
                textOutput.innerText = data.result || data.translation;
            } catch (err) {
                textOutput.innerText = "Fehler bei der Verarbeitung.";
            }
        });

        // Zurücksetzen
        resetBtn.addEventListener('click', () => {
            textInput.value = "";
            textInput.dispatchEvent(new Event('input'));
            resultCard.classList.add('hidden');
        });

        // Vorlesen & Download
        document.getElementById('speak-btn').addEventListener('click', () => {
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(textOutput.innerText));
        });
        document.getElementById('download-btn').addEventListener('click', () => {
            const blob = new Blob([textOutput.innerText], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'contexto-ergebnis.txt';
            link.click();
        });
    </script>
</body>
</html>
