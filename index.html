<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contexto - All-in-One Textplattform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Contexto</h1>
            <p>Intelligente Textanalyse & Multilinguale Übersetzung</p>
        </header>

        <main>
            <div class="card input-section">
                <div class="card-header">
                    <div class="file-actions">
                        <label for="file-upload" class="btn btn-secondary">Datei einfügen (.txt)</label>
                        <input type="file" id="file-upload" accept=".txt" style="display: none;">
                    </div>
                    <div class="audio-actions">
                        <button id="dictate-btn" class="btn btn-secondary">🎙️ Spracheingabe</button>
                    </div>
                </div>

                <textarea id="text-input" placeholder="Füge hier deinen Text ein, lade eine Datei hoch oder nutze die Spracheingabe..."></textarea>
                
                <div class="controls">
                    <div class="dropdown-group">
                        <label for="language-select">Ziel-Sprache:</label>
                        <select id="language-select" class="dropdown">
                            <option value="English">Englisch (English)</option>
                            <option value="Spanish">Spanisch (Español)</option>
                            <option value="Mandarin Chinese">Chinesisch / Mandarin (中文)</option>
                            <option value="Hindi">Hindi (हिन्दी)</option>
                            <option value="Arabic">Arabisch (العربية)</option>
                            <option value="Portuguese">Portugiesisch (Português)</option>
                            <option value="Bengali">Bengali (বাংলা)</option>
                            <option value="Russian">Russisch (Русский)</option>
                            <option value="Japanese">Japanisch (日本語)</option>
                            <option value="Punjabi">Panjabi (ਪੰਜਾਬੀ)</option>
                            <option value="German">Deutsch (Deutsch)</option>
                            <option value="Javanese">Javanisch (Wong Jawa)</option>
                            <option value="Wu Chinese">Wu-Chinesisch (吴语)</option>
                            <option value="Malay/Indonesian">Malaiisch / Indonesisch (Bahasa)</option>
                            <option value="Telugu">Telugu (తెలుగు)</option>
                            <option value="Vietnamese">Vietnamesisch (Tiếng Việt)</option>
                            <option value="Korean">Koreanisch (한국어)</option>
                            <option value="French">Französisch (Français)</option>
                            <option value="Marathi">Marathi (मраठी)</option>
                            <option value="Tamil">Tamil (தமிழ்)</option>
                            <option value="Turkish">Türkisch (Türkçe)</option>
                            <option value="Urdu">Urdu (اُردُو)</option>
                            <option value="Italian">Italienisch (Italiano)</option>
                            <option value="Yue Chinese/Cantonese">Kantonesisch (粵語)</option>
                            <option value="Persian/Farsi">Persisch / Farsi (فارسی)</option>
                        </select>
                    </div>

                    <div class="action-buttons">
                        <button id="check-btn" class="btn btn-secondary">Grammatik prüfen</button>
                        <button id="translate-btn" class="btn btn-primary">Übersetzen</button>
                    </div>
                </div>
            </div>

            <div class="metrics-row">
                <div class="metric-card">Wörter: <span id="word-count">0</span></div>
                <div class="metric-card">Zeichen: <span id="char-count">0</span></div>
            </div>

            <div class="card output-section">
                <div class="output-header">
                    <h3>Ergebnis:</h3>
                    <div id="loading-spinner" class="spinner hidden"></div>
                    <div class="output-utilities">
                        <button id="speak-btn" class="btn btn-small">🔊 Vorlesen</button>
                        <button id="download-btn" class="btn btn-small">📥 Herunterladen</button>
                    </div>
                </div>
                <div id="text-output" class="output-box">Dein Ergebnis erscheint hier...</div>
            </div>
        </main>
    </div>

    <script>
        const textInput = document.getElementById('text-input');
        const textOutput = document.getElementById('text-output');
        const spinner = document.getElementById('loading-spinner');

        // 1. Live Text-Metriken (Wörter & Zeichen)
        textInput.addEventListener('input', () => {
            const text = textInput.value.trim();
            document.getElementById('char-count').innerText = text.length;
            document.getElementById('word-count').innerText = text ? text.split(/\s+/).length : 0;
        });

        // 2. Datei einfügen (.txt)
        document.getElementById('file-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                textInput.value = evt.target.result;
                textInput.dispatchEvent(new Event('input'));
            };
            reader.readAsText(file);
        });

        // 3. Spracheingabe (Diktieren via Web Speech API)
        const dictateBtn = document.getElementById('dictate-btn');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'de-DE';
            recognition.interimResults = false;

            dictateBtn.addEventListener('click', () => {
                recognition.start();
                dictateBtn.innerText = "🎙️ Höre zu...";
            });

            recognition.addEventListener('result', (e) => {
                const transcript = e.results[0][0].transcript;
                textInput.value += (textInput.value ? " " : "") + transcript;
                textInput.dispatchEvent(new Event('input'));
            });

            recognition.addEventListener('end', () => {
                dictateBtn.innerText = "🎙️ Spracheingabe";
            });
        } else {
            dictateBtn.style.display = 'none';
        }

        // 4. KI-Übersetzung mit Credit-Schutz
        document.getElementById('translate-btn').addEventListener('click', async () => {
            const text = textInput.value.trim();
            const language = document.getElementById('language-select').value;

            if (!text || text.length < 3) {
                alert("Bitte gib einen gültigen Text ein (mindestens 3 Zeichen)!");
                return;
            }

            spinner.classList.remove('hidden');
            textOutput.innerText = "Übersetzung wird generiert...";

            try {
                const response = await fetch('/.netlify/functions/translate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, language, task: 'translate' })
                });
                const data = await response.json();
                textOutput.innerText = data.translation || data.result;
            } catch (err) {
                textOutput.innerText = "Fehler bei der Übersetzung.";
            } finally {
                spinner.classList.add('hidden');
            }
        });

        // 5. Lokaler/Einfacher Grammatik- & Stil-Check (Simuliert/Erweiterbar)
        document.getElementById('check-btn').addEventListener('click', () => {
            const text = textInput.value.trim();
            if (!text) return alert("Bitte gib zuerst einen Text ein!");
            
            textOutput.innerHTML = "<strong>Grammatik-Check durchgeführt:</strong><br><br>" + 
                (text.includes("ihm Monitor") ? text.replace("ihm Monitor", "<span style='color: #ef4444; text-decoration: underline;'>seinem Monitor</span> (Grammatikfehler korrigiert)") : text + "<br><br>✓ Keine offensichtlichen Fehler gefunden!");
        });

        // 6. Sprachausgabe (Vorlesen)
        document.getElementById('speak-btn').addEventListener('click', () => {
            const text = textOutput.innerText;
            if (!text || text.startsWith("Dein Ergebnis")) return;
            const utterance = new SpeechSynthesisUtterance(text);
            window.speechSynthesis.speak(utterance);
        });

        // 7. Datei Herunterladen (.txt)
        document.getElementById('download-btn').addEventListener('click', () => {
            const text = textOutput.innerText;
            if (!text || text.startsWith("Dein Ergebnis")) return;
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'contexto-ergebnis.txt';
            link.click();
        });
    </script>
</body>
</html>
